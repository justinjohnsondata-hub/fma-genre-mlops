name: hello-world

# Runs on every push and PR, plus a manual button in the Actions tab.
# Purpose (Phase 0): prove the runner + install path end-to-end BEFORE any real
# code exists, so a broken environment surfaces now instead of on day 3.
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Pinned to 3.13 (Justin's call): matches the 3.13.9 conda base, and avoids
          # the mlflow-on-3.14 server crash. Quoted so YAML reads it as the string
          # "3.13", not the float 3.13 (which would drop a trailing zero, e.g. 3.10 -> 3.1).
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Trivial check — report tool versions
        # Directly satisfies the Phase 0 done-condition: "dvc + mlflow report versions".
        # If the env is wrong, these imports fail here and the run goes red.
        run: |
          python -c "import dvc, mlflow; print('dvc', dvc.__version__); print('mlflow', mlflow.__version__)"
          echo "hello-world: runner + install path OK"
